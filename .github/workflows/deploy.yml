name: AWS 배포

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: aws-deploy-main
  cancel-in-progress: true

jobs:
  build:
    name: 빌드 번들 생성
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          clean: true

      # ----------------------------
      # 1) 시크릿 필수값 검사
      #   - 빌드에 실제로 쓰는 값만 점검해서 실패 원인을 명확하게 만듭니다.
      # ----------------------------
      - name: 배포/앱 시크릿 검사
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          OAUTH_GOOGLE_CLIENT_ID: ${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}
          OAUTH_GOOGLE_CLIENT_SECRET: ${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}
          OAUTH_KAKAO_CLIENT_ID: ${{ secrets.OAUTH_KAKAO_CLIENT_ID }}
          OAUTH_KAKAO_CLIENT_SECRET: ${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
          PORTONE_STORE_ID: ${{ secrets.PORTONE_STORE_ID }}
          PORTONE_API_SECRET: ${{ secrets.PORTONE_API_SECRET }}
          PORTONE_CHANNEL_KEY_KAKAO: ${{ secrets.PORTONE_CHANNEL_KEY_KAKAO }}
          PORTONE_CHANNEL_KEY_TOSS: ${{ secrets.PORTONE_CHANNEL_KEY_TOSS }}
          PORTONE_CHANNEL_KEY_TOSS_PAYMENTS: ${{ secrets.PORTONE_CHANNEL_KEY_TOSS_PAYMENTS }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_KAKAO_JS_KEY: ${{ secrets.VITE_KAKAO_JS_KEY }}
          VITE_JUSO_API_KEY: ${{ secrets.VITE_JUSO_API_KEY }}
        run: |
          set -euo pipefail

          REQUIRED_KEYS=(
            SPRING_DATASOURCE_URL
            SPRING_DATASOURCE_USERNAME
            SPRING_DATASOURCE_PASSWORD
            OAUTH_GOOGLE_CLIENT_ID
            OAUTH_GOOGLE_CLIENT_SECRET
            OAUTH_KAKAO_CLIENT_ID
            OAUTH_KAKAO_CLIENT_SECRET
            FRONTEND_URL
            JWT_SECRET
            JWT_EXPIRATION
            PORTONE_STORE_ID
            PORTONE_API_SECRET
            PORTONE_CHANNEL_KEY_KAKAO
            PORTONE_CHANNEL_KEY_TOSS
            PORTONE_CHANNEL_KEY_TOSS_PAYMENTS
            KAKAO_REST_API_KEY
            VITE_API_BASE_URL
            VITE_KAKAO_JS_KEY
            VITE_JUSO_API_KEY
          )

          for key in "${REQUIRED_KEYS[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "::error::GitHub Secrets의 ${key} 값이 비어 있습니다."
              exit 1
            fi
          done

      # ----------------------------
      # 2) 런타임/빌드 환경파일 생성
      #   - 백엔드는 systemd EnvironmentFile 용도
      #   - 프런트는 Vite 빌드 시점 env 용도
      # ----------------------------
      - name: 백엔드 런타임 환경파일 생성
        run: |
          set -euo pipefail

          UPLOAD_PATH="${{ secrets.UPLOAD_PATH }}"
          ITEM_IMG_LOCATION="${{ secrets.ITEM_IMG_LOCATION }}"
          SPRING_PROFILES_ACTIVE="${{ secrets.SPRING_PROFILES_ACTIVE }}"

          if [ -z "${UPLOAD_PATH}" ]; then
            UPLOAD_PATH="file:/opt/hanspoon/data/images/"
          fi

          if [ -z "${ITEM_IMG_LOCATION}" ]; then
            ITEM_IMG_LOCATION="/opt/hanspoon/data/images"
          fi

          {
            echo "SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}"
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}"
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}"
            echo "OAUTH_GOOGLE_CLIENT_ID=${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}"
            echo "OAUTH_GOOGLE_CLIENT_SECRET=${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}"
            echo "OAUTH_KAKAO_CLIENT_ID=${{ secrets.OAUTH_KAKAO_CLIENT_ID }}"
            echo "OAUTH_KAKAO_CLIENT_SECRET=${{ secrets.OAUTH_KAKAO_CLIENT_SECRET }}"
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}"
            echo "PORTONE_STORE_ID=${{ secrets.PORTONE_STORE_ID }}"
            echo "PORTONE_API_SECRET=${{ secrets.PORTONE_API_SECRET }}"
            echo "PORTONE_CHANNEL_KEY_KAKAO=${{ secrets.PORTONE_CHANNEL_KEY_KAKAO }}"
            echo "PORTONE_CHANNEL_KEY_TOSS=${{ secrets.PORTONE_CHANNEL_KEY_TOSS }}"
            echo "PORTONE_CHANNEL_KEY_TOSS_PAYMENTS=${{ secrets.PORTONE_CHANNEL_KEY_TOSS_PAYMENTS }}"
            echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}"
            echo "UPLOAD_PATH=${UPLOAD_PATH}"
            echo "ITEM_IMG_LOCATION=${ITEM_IMG_LOCATION}"
            if [ -n "${SPRING_PROFILES_ACTIVE}" ]; then
              echo "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"
            fi
          } > hanspoon_backend/backend.env

          chmod 600 hanspoon_backend/backend.env

      - name: 프런트엔드 빌드용 환경파일 생성
        working-directory: hanspoon_frontend
        run: |
          set -euo pipefail

          {
            echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}"
            echo "VITE_KAKAO_JS_KEY=${{ secrets.VITE_KAKAO_JS_KEY }}"
            echo "VITE_JUSO_API_KEY=${{ secrets.VITE_JUSO_API_KEY }}"
          } > .env.production

      # ----------------------------
      # 3) 백엔드/프런트 빌드
      #   - 운영 서버 자원을 잡아먹지 않도록 GitHub Hosted Runner에서 수행합니다.
      # ----------------------------
      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: 백엔드 빌드
        id: backend_build
        working-directory: hanspoon_backend
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew clean bootJar -x test

          JAR_PATH="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)"
          if [ -z "${JAR_PATH}" ]; then
            echo "::error::백엔드 JAR 파일을 찾지 못했습니다."
            ls -al build/libs || true
            exit 1
          fi

          echo "jar_path=${JAR_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hanspoon_frontend/package-lock.json

      - name: 프런트엔드 빌드
        working-directory: hanspoon_frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

      # ----------------------------
      # 4) 배포 번들 생성 및 업로드
      #   - self-hosted runner는 이 산출물만 받아 배포합니다.
      # ----------------------------
      - name: 배포 번들 생성
        run: |
          set -euo pipefail

          rm -rf deploy_bundle
          mkdir -p deploy_bundle/backend deploy_bundle/frontend

          cp "hanspoon_backend/${{ steps.backend_build.outputs.jar_path }}" "deploy_bundle/backend/app.jar"
          cp "hanspoon_backend/backend.env" "deploy_bundle/backend/backend.env"
          chmod 600 "deploy_bundle/backend/backend.env"
          cp -R hanspoon_frontend/dist/. deploy_bundle/frontend/

          if [ -f deploy.md ]; then
            cp deploy.md deploy_bundle/deploy.md
          fi

      - name: 배포 번들 업로드
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: deploy_bundle
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: EC2 배포
    needs: build
    runs-on: [self-hosted, Linux, X64, hanspoon-deploy]
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: 배포 번들 다운로드
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle-${{ github.sha }}
          path: .

      # ----------------------------
      # 5) 동일 서버 로컬 배포
      #   - 운영 EC2에서는 파일 배치와 서비스 재시작만 수행합니다.
      #   - 빌드 부하를 제거해서 러너 끊김 가능성을 낮춥니다.
      # ----------------------------
      - name: EC2 로컬 배포 실행
        env:
          APP_ROOT: ${{ secrets.EC2_APP_ROOT }}
          SERVICE_NAME: ${{ secrets.EC2_SERVICE_NAME }}
          HEALTHCHECK_URL: ${{ secrets.EC2_HEALTHCHECK_URL }}
          HEALTHCHECK_RETRY: ${{ secrets.EC2_HEALTHCHECK_RETRY }}
          HEALTHCHECK_DELAY: ${{ secrets.EC2_HEALTHCHECK_DELAY }}
          KEEP_RELEASES: ${{ secrets.EC2_KEEP_RELEASES }}
        run: |
          set -euo pipefail

          APP_ROOT="${APP_ROOT:-/opt/hanspoon}"
          KEEP_RELEASES="${KEEP_RELEASES:-5}"
          HEALTHCHECK_URL="${HEALTHCHECK_URL:-http://127.0.0.1/api/actuator/health}"
          HEALTHCHECK_RETRY="${HEALTHCHECK_RETRY:-20}"
          HEALTHCHECK_DELAY="${HEALTHCHECK_DELAY:-3}"

          if ! [[ "${KEEP_RELEASES}" =~ ^[0-9]+$ ]]; then
            echo "::warning::KEEP_RELEASES 값이 숫자가 아니어서 기본값 5를 사용합니다."
            KEEP_RELEASES="5"
          fi

          SUDO="sudo"
          if [ "$(id -u)" -eq 0 ]; then
            SUDO=""
          elif ! sudo -n true >/dev/null 2>&1; then
            echo "::error::현재 계정은 비밀번호 없는 sudo 권한이 없어 배포를 중단합니다."
            exit 1
          fi

          DEPLOY_USER="$(id -un)"
          SERVICE_NAME="${SERVICE_NAME:-}"
          if [ -z "${SERVICE_NAME}" ]; then
            for CANDIDATE in hanspoon-backend hanspoon-backend.service hanspoon; do
              if ${SUDO} systemctl status "${CANDIDATE}" >/dev/null 2>&1; then
                SERVICE_NAME="${CANDIDATE}"
                break
              fi
            done
            if [ -z "${SERVICE_NAME}" ]; then
              SERVICE_NAME="hanspoon-backend"
            fi
          fi

          RELEASE_DIR="${APP_ROOT}/releases/${GITHUB_SHA}"
          CURRENT_LINK="${APP_ROOT}/current"
          # download-artifact가 푸는 위치는 액션 버전/지정 path에 따라 달라질 수 있습니다.
          # 실제 서버에서는 세 가지 구조가 모두 관찰될 수 있어 순서대로 확인합니다.
          if [ -f "${GITHUB_WORKSPACE}/backend/backend.env" ]; then
            PAYLOAD_DIR="${GITHUB_WORKSPACE}"
          elif [ -f "${GITHUB_WORKSPACE}/deploy_bundle/backend/backend.env" ]; then
            PAYLOAD_DIR="${GITHUB_WORKSPACE}/deploy_bundle"
          elif [ -f "${GITHUB_WORKSPACE}/deploy_bundle/deploy_bundle/backend/backend.env" ]; then
            PAYLOAD_DIR="${GITHUB_WORKSPACE}/deploy_bundle/deploy_bundle"
          else
            echo "::error::배포 번들 경로를 찾지 못했습니다."
            find "${GITHUB_WORKSPACE}" -maxdepth 4 -type f | sort || true
            exit 1
          fi

          echo "[배포] 릴리즈 경로: ${RELEASE_DIR}"
          ${SUDO} rm -rf "${RELEASE_DIR}" || true
          ${SUDO} mkdir -p "${RELEASE_DIR}/backend" "${RELEASE_DIR}/frontend"

          echo "[배포] 파일 복사"
          ${SUDO} cp "${PAYLOAD_DIR}/backend/app.jar" "${RELEASE_DIR}/backend/app.jar"
          ${SUDO} cp "${PAYLOAD_DIR}/backend/backend.env" "${RELEASE_DIR}/backend/.env"
          ${SUDO} cp -r "${PAYLOAD_DIR}/frontend/." "${RELEASE_DIR}/frontend/"

          ${SUDO} mkdir -p "${APP_ROOT}/env"
          ${SUDO} cp "${RELEASE_DIR}/backend/.env" "${APP_ROOT}/env/backend.env"
          ${SUDO} chmod 600 "${APP_ROOT}/env/backend.env" || true
          ${SUDO} chown "${DEPLOY_USER}:${DEPLOY_USER}" "${RELEASE_DIR}/backend/.env" || true
          ${SUDO} chmod 600 "${RELEASE_DIR}/backend/.env" || true

          if [ -f "${PAYLOAD_DIR}/deploy.md" ]; then
            ${SUDO} cp "${PAYLOAD_DIR}/deploy.md" "${RELEASE_DIR}/deploy.md"
          fi

          echo "[배포] current 링크 전환"
          if ${SUDO} test -d "${CURRENT_LINK}" && ! ${SUDO} test -L "${CURRENT_LINK}"; then
            ${SUDO} rm -rf "${CURRENT_LINK}"
          fi
          ${SUDO} ln -sfnT "${RELEASE_DIR}" "${CURRENT_LINK}"

          echo "[배포] 서비스 재시작: ${SERVICE_NAME}"
          ${SUDO} systemctl restart "${SERVICE_NAME}"
          ${SUDO} systemctl is-active --quiet "${SERVICE_NAME}" || {
            echo "::error::서비스가 active 상태가 아닙니다."
            ${SUDO} journalctl -u "${SERVICE_NAME}" -n 160 --no-pager || true
            exit 1
          }

          if ${SUDO} systemctl status nginx >/dev/null 2>&1; then
            ${SUDO} nginx -t
            ${SUDO} systemctl reload nginx || ${SUDO} systemctl restart nginx
          fi

          echo "[배포] 헬스체크: ${HEALTHCHECK_URL}"
          OK="0"
          for i in $(seq 1 "${HEALTHCHECK_RETRY}"); do
            if curl -fsS "${HEALTHCHECK_URL}" >/dev/null; then
              OK="1"
              break
            fi
            sleep "${HEALTHCHECK_DELAY}"
          done

          if [ "${OK}" != "1" ]; then
            echo "::error::헬스체크 실패"
            ${SUDO} journalctl -u "${SERVICE_NAME}" -n 160 --no-pager || true
            exit 1
          fi

          if [ "${KEEP_RELEASES}" -gt 0 ]; then
            IDX=0
            for REL in $(${SUDO} ls -1dt "${APP_ROOT}"/releases/* 2>/dev/null || true); do
              IDX=$((IDX + 1))
              if [ "${IDX}" -le "${KEEP_RELEASES}" ]; then
                continue
              fi
              ${SUDO} rm -rf -- "${REL}"
            done
          fi

          echo "[배포] 완료"
