name: Deploy Fullstack to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------
      # Backend build (Spring Boot)
      # -------------------------
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: hanspoon_backend
        run: chmod +x gradlew

      - name: Build backend
        working-directory: hanspoon_backend
        run: ./gradlew clean build -x test

      # -------------------------
      # Frontend build (Vite)
      # -------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hanspoon_frontend/package-lock.json

      - name: Build frontend
        working-directory: hanspoon_frontend
        env:
          # 프런트에서 필요한 환경변수(필요한 것만)
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      # -------------------------
      # Upload artifacts to EC2
      # -------------------------
      - name: Copy backend JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: hanspoon_backend/build/libs/*.jar
          target: /opt/hanspoon/releases/${{ github.sha }}/backend/
          strip_components: 3

      - name: Copy frontend dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: hanspoon_frontend/dist/*
          target: /opt/hanspoon/releases/${{ github.sha }}/frontend/

      # -------------------------
      # Activate release & restart
      # -------------------------
      - name: Activate & Restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            RELEASE_DIR="/opt/hanspoon/releases/${{ github.sha }}"
            CURRENT_LINK="/opt/hanspoon/current"

            echo "=== RELEASE_DIR tree (top) ==="
            find "$RELEASE_DIR" -maxdepth 4 -type f | sed -n '1,200p'

            # -----------------------------
            # 1) 백엔드 JAR 찾기 (plain.jar 제외)
            # -----------------------------
            JAR_PATH=$(find "$RELEASE_DIR/backend" -name "*.jar" ! -name "*-plain.jar" | head -n 1)

            if [ -z "$JAR_PATH" ]; then
              echo "❌ 실행 가능한 JAR(*-plain.jar 제외)을 찾지 못했어."
              exit 1
            fi

            mkdir -p "$RELEASE_DIR/backend"
            cp "$JAR_PATH" "$RELEASE_DIR/backend/app.jar"

            # -----------------------------
            # 2) 프런트 dist 평탄화
            #    nginx root가 /opt/hanspoon/current/frontend 라는 전제
            # -----------------------------
            DIST_DIR="$RELEASE_DIR/frontend/hanspoon_frontend/dist"
 
            if [ -d "$DIST_DIR" ]; then
              mkdir -p "$RELEASE_DIR/frontend"
              cp -r "$DIST_DIR/." "$RELEASE_DIR/frontend/"
            else
              echo "⚠️ dist 폴더를 못 찾았어: $DIST_DIR"
            fi

            # -----------------------------
            # 3) current 링크 교체
            # -----------------------------
            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            # -----------------------------
            # 4) 재시작
            # -----------------------------
            sudo systemctl restart hanspoon-backend
            sudo systemctl reload nginx

            echo "✅ Deploy done. app.jar=$RELEASE_DIR/backend/app.jar"
